<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Crop AI Platform</title>

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- Google Font -->
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Custom CSS -->
    <link
        rel="stylesheet"
        href="{{ url_for('static',
        filename='css/style.css') }}">

</head>

<body>

    <!-- Sidebar -->

    <div class="sidebar">

        <div class="logo">
            🌾 Crop AI
        </div>

        <a href="/">
            <i class="bi bi-house-fill"></i>
            Dashboard
        </a>

        <a href="/about">
            <i class="bi bi-info-circle-fill"></i>
            About
        </a>

    </div>

    <!-- Main Content -->

    <div class="main-content">

        <nav class="navbar navbar-dark glass-card mb-4">

            <div class="container-fluid">

                <span class="navbar-brand mb-0 h1">

                    🤖 AI Crop Classification Platform

                </span>

            </div>

        </nav>

        {% block content %}
        {% endblock %}

    </div>

    <!-- Bootstrap JS -->

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

    <script src="{{ url_for(
        'static',
        filename='js/main.js'
    ) }}"></script>

</body>

</html>
